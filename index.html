<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崴正營造 — 估算總表儀表板</title>
    <!-- 引入外部函式庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #006e25;
            --primary-container: #28a745;
            --surface: #ebedef;
            --surface-card: #ffffff;
            --on-surface: #141d23;
            --sidebar-bg: #3c4b64;
            --border: #d8dbe0;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--surface); color: var(--on-surface); margin: 0; overflow: hidden; }
        .font-mono-code { font-family: 'JetBrains Mono', monospace; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
        .wz-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: 0.375rem; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); }
        .cat-pill { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; display: inline-block; min-width: 70px; text-align: center; }
        .cat-C { background-color: #cce5ff; color: #004085; }
        .cat-D { background-color: #fff3cd; color: #856404; }
        .cat-E { background-color: #d4edda; color: #155724; }
        .cat-F { background-color: #e2e3e5; color: #383d41; }
        .cat-G { background-color: #fce4ec; color: #880e4f; }
        .cat-I { background-color: #f8d7da; color: #721c24; }
        .cat-M { background-color: #e0cffc; color: #4b0082; }
        .cat-K { background-color: #ffe8d6; color: #d35400; }
        .cat-Other { background-color: #f1f3f5; color: #495057; }
        .filter-btn.active { background: var(--sidebar-bg); color: white; border-color: var(--sidebar-bg); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
        
        .editable:hover { background-color: #f0fdf4; cursor: pointer; }
        .editing-input { width: 100%; border: 2px solid var(--primary); border-radius: 4px; padding: 2px 4px; outline: none; }
        
        /* 側邊欄刪除按鈕樣式 */
        .vendor-item:hover .delete-vendor-btn { opacity: 1; }
        .delete-vendor-btn { opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 flex-shrink-0 flex flex-col transition-all duration-300 shadow-xl z-20" style="background-color: var(--sidebar-bg); color: rgba(255,255,255,0.8);">
        <div class="h-16 flex items-center justify-center font-bold text-xl text-white tracking-widest border-b border-gray-700 font-bebas">
            WEI-ZHENG <span class="text-green-400 ml-1">OFFICIAL</span>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">數據管理中心</li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-white" style="background-color: rgba(255,255,255,0.05); border-left: 4px solid var(--primary-container);">
                        <i class="fa-solid fa-chart-pie w-6"></i><span>估算彙整儀表板</span>
                    </a>
                </li>
                <li class="px-6 py-4">
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">標單資料載入</label>
                    <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" multiple class="hidden" onchange="handleMultipleFiles(event)">
                    <button onclick="document.getElementById('excel-upload').click()" class="w-full py-2 bg-green-600 hover:bg-green-700 text-white rounded text-sm transition font-bold shadow-lg">
                        <i class="fa-solid fa-file-circle-plus mr-2"></i>匯入工料標單
                    </button>
                </li>
            </ul>
            <div id="vendor-list" class="mt-6 px-3">
                <li class="text-xs font-semibold text-gray-400 uppercase mb-2 px-3 flex justify-between">
                    <span>已匯入標單列表</span>
                    <span id="vendor-count" class="text-green-400">0</span>
                </li>
                <ul id="vendor-items" class="space-y-1 text-sm">
                    <li class="px-3 py-2 text-gray-500 italic text-xs text-center">尚未匯入任何檔案</li>
                </ul>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10">
            <div>
                <h1 class="text-lg font-bold text-gray-800 tracking-tight">崴正營造官方資料庫</h1>
                <p class="text-[10px] text-gray-500 italic">點擊儲存格即可編輯，變更將即時反映於總表中</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="loading-spinner" class="hidden flex items-center text-green-600 text-xs font-bold">
                    <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>系統處理中...
                </div>
                <button onclick="resetData()" class="px-3 py-1.5 border border-red-200 text-xs text-red-600 hover:bg-red-50 rounded transition">
                    <i class="fa-solid fa-trash-can mr-1"></i>重置資料庫
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="wz-card p-4 border-l-4 border-l-blue-500">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">總項次筆數</div>
                    <div id="stat-total" class="text-3xl font-bebas text-blue-600">0</div>
                </div>
                <div class="wz-card p-4 border-l-4 border-l-green-500">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">資料來源數</div>
                    <div id="stat-vendors" class="text-3xl font-bebas text-green-600">0</div>
                </div>
                <div class="wz-card p-4 border-l-4 border-l-cyan-500">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">結構體筆數</div>
                    <div id="stat-c" class="text-3xl font-bebas text-cyan-600">0</div>
                </div>
                <div class="wz-card p-4 border-l-4 border-l-amber-500">
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">地坪工程筆數</div>
                    <div id="stat-e" class="text-3xl font-bebas text-amber-600">0</div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="wz-card p-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-10">
                <div class="flex flex-wrap gap-1.5" id="filter-btns"></div>
                <div class="relative w-full md:w-72">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="搜尋工料代號、名稱或廠商..." class="w-full border rounded-full pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 border-gray-300">
                </div>
            </div>

            <!-- Data Table -->
            <div class="wz-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-50 border-b text-gray-600">
                                <th class="p-4 font-bold">工程分類</th>
                                <th class="p-4 font-bold">工料編號</th>
                                <th class="p-4 font-bold">工料名稱</th>
                                <th class="p-4 font-bold">單位</th>
                                <th class="p-4 font-bold">來源</th>
                                <th class="p-4 font-bold text-right">合計數量</th>
                                <th class="p-4 font-bold text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="7" class="p-16 text-center text-gray-400 italic">資料庫目前為空，請匯入標單</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allMaterials = [];
        let vendors = new Set();
        let currentFilter = 'ALL';

        const categoryMap = {
            'C': '結構工程', 'D': '隔間工程', 'E': '地坪工程', 'F': '平頂工程',
            'G': '內牆工程', 'H': '踢腳工程', 'I': '防水工程', 'K': '外牆工程', 'M': '門窗工程'
        };

        async function handleMultipleFiles(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            document.getElementById('loading-spinner').classList.remove('hidden');
            
            const processPromises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const vendorName = file.name.replace(/\.[^/.]+$/, "");
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                            processRows(rows, vendorName);
                            resolve();
                        } catch (err) {
                            console.error(err);
                            resolve();
                        }
                    };
                    reader.readAsBinaryString(file);
                });
            });

            await Promise.all(processPromises);
            document.getElementById('loading-spinner').classList.add('hidden');
            e.target.value = '';
            updateUI();
        }

        function processRows(rows, sourceName) {
            const newItems = rows.map((row, index) => {
                const code = (row['工料編號'] || row['編碼'] || row['編號'] || '').toString().trim();
                const name = (row['工料名稱'] || row['名稱'] || row['項目名稱'] || '').toString().trim();
                const unit = (row['單位'] || '').toString().trim();
                let totalStr = row['合計'] || row['數量'] || row['總量'] || '0';
                const total = parseFloat(totalStr.toString().replace(/,/g, '')) || 0;

                if (!code || !name || code === '序號') return null;

                const catKey = code.charAt(0).toUpperCase();
                return {
                    id: Date.now() + Math.random(),
                    code, name, unit, total, 
                    vendor: sourceName,
                    catCode: categoryMap[catKey] ? catKey : 'Other',
                    catName: categoryMap[catKey] || '其他項目'
                };
            }).filter(item => item !== null);

            allMaterials = [...allMaterials, ...newItems];
            vendors.add(sourceName);
        }

        function updateMaterial(id, field, value) {
            const index = allMaterials.findIndex(m => m.id === id);
            if (index !== -1) {
                if (field === 'total') {
                    allMaterials[index][field] = parseFloat(value) || 0;
                } else if (field === 'code') {
                    allMaterials[index][field] = value;
                    const catKey = value.charAt(0).toUpperCase();
                    allMaterials[index].catCode = categoryMap[catKey] ? catKey : 'Other';
                    allMaterials[index].catName = categoryMap[catKey] || '其他項目';
                } else {
                    allMaterials[index][field] = value;
                }
                updateUI();
            }
        }

        function deleteMaterial(id) {
            if (confirm("確認移除此項資料？")) {
                allMaterials = allMaterials.filter(m => m.id !== id);
                const remainingVendors = new Set(allMaterials.map(m => m.vendor));
                vendors = remainingVendors;
                updateUI();
            }
        }

        // 新增：刪除整個檔案的資料
        function deleteFileSource(sourceName) {
            if (confirm(`確定要刪除來自「${sourceName}」的所有資料嗎？此操作不可復原。`)) {
                allMaterials = allMaterials.filter(m => m.vendor !== sourceName);
                vendors.delete(sourceName);
                updateUI();
            }
        }

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('table-body');
            const filtered = allMaterials.filter(m => {
                const matchFilter = currentFilter === 'ALL' || m.catCode === currentFilter;
                const matchSearch = m.name.toLowerCase().includes(search) || m.code.toLowerCase().includes(search) || m.vendor.toLowerCase().includes(search);
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-16 text-center text-gray-400 italic">無符合條件資料</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(m => `
                <tr class="hover:bg-gray-50 border-b border-gray-50 transition">
                    <td class="p-4"><span class="cat-pill cat-${m.catCode}">${m.catName}</span></td>
                    <td class="p-4 font-mono-code text-blue-700 font-medium editable" ondblclick="makeEditable(this, '${m.id}', 'code')">${m.code}</td>
                    <td class="p-4 text-gray-800 font-medium editable" ondblclick="makeEditable(this, '${m.id}', 'name')">${m.name}</td>
                    <td class="p-4 text-gray-500 editable" ondblclick="makeEditable(this, '${m.id}', 'unit')">${m.unit || '-'}</td>
                    <td class="p-4 text-xs text-gray-400">${m.vendor}</td>
                    <td class="p-4 text-right font-mono-code font-bold text-green-700 editable" ondblclick="makeEditable(this, '${m.id}', 'total')">
                        ${m.total.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteMaterial('${m.id}')" class="text-red-300 hover:text-red-600 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        window.makeEditable = function(element, id, field) {
            if (element.querySelector('input')) return;
            const originalValue = element.innerText.replace(/,/g, '');
            element.innerHTML = `<input type="text" class="editing-input" value="${originalValue}">`;
            const input = element.querySelector('input');
            input.focus();

            const save = () => {
                const newValue = input.value;
                if (newValue !== originalValue) {
                    updateMaterial(parseFloat(id), field, newValue);
                } else {
                    renderTable();
                }
            };

            input.onblur = save;
            input.onkeydown = (e) => { if (e.key === 'Enter') save(); };
        };

        function renderStats() {
            document.getElementById('stat-total').innerText = allMaterials.length;
            document.getElementById('stat-vendors').innerText = vendors.size;
            document.getElementById('stat-c').innerText = allMaterials.filter(m => m.catCode === 'C').length;
            document.getElementById('stat-e').innerText = allMaterials.filter(m => m.catCode === 'E').length;
            document.getElementById('vendor-count').innerText = vendors.size;
        }

        function renderVendorSidebar() {
            const list = document.getElementById('vendor-items');
            if (vendors.size === 0) {
                list.innerHTML = `<li class="px-3 py-2 text-gray-500 italic text-xs text-center">無已載入資料庫</li>`;
                return;
            }

            list.innerHTML = Array.from(vendors).map(v => `
                <li class="vendor-item flex items-center justify-between px-3 py-2 mx-2 mb-1 bg-white/5 rounded transition text-xs group">
                    <div class="flex items-center truncate flex-1 mr-2" title="${v}">
                        <i class="fa-solid fa-database text-green-400 mr-2"></i>
                        <span class="truncate text-gray-300 group-hover:text-white">${v}</span>
                    </div>
                    <button onclick="deleteFileSource('${v}')" class="delete-vendor-btn p-1 text-red-400 hover:text-red-600 hover:bg-red-500/10 rounded" title="刪除此檔案所有資料">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </li>
            `).join('');
        }

        function renderFilterButtons() {
            const btns = document.getElementById('filter-btns');
            const cats = ['ALL', ...Object.keys(categoryMap), 'Other'];
            btns.innerHTML = cats.map(c => {
                let count = c === 'ALL' ? allMaterials.length : allMaterials.filter(m => m.catCode === c).length;
                if (c !== 'ALL' && count === 0) return '';
                return `
                    <button onclick="setFilter('${c}')" class="filter-btn px-3 py-1.5 text-xs border rounded-full transition flex items-center gap-2 ${currentFilter === c ? 'active' : 'bg-white text-gray-600'}">
                        ${c === 'ALL' ? '全部項目' : (categoryMap[c] || '其他')} <span class="font-mono opacity-50">${count}</span>
                    </button>
                `;
            }).join('');
        }

        function updateUI() { renderTable(); renderStats(); renderVendorSidebar(); renderFilterButtons(); }
        function setFilter(c) { currentFilter = c; updateUI(); }
        function resetData() { if (confirm("確定清空所有載入數據？")) { allMaterials = []; vendors.clear(); updateUI(); } }
        document.getElementById('searchInput').addEventListener('input', renderTable);
        renderFilterButtons();
    </script>
</body>
</html>
