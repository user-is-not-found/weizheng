<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崴正營造 — 雲端儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #006e25; --sidebar-bg: #3c4b64; --surface: #ebedef; --border: #d8dbe0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--surface); margin: 0; overflow: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        .wz-card { background: white; border: 1px solid var(--border); border-radius: 0.375rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .cat-pill { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; display: inline-block; min-width: 70px; text-align: center; }
        .cat-C { background-color: #cce5ff; color: #004085; }
        .cat-E { background-color: #d4edda; color: #155724; }
        .cat-Other { background-color: #f1f3f5; color: #495057; }
        .loading-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="flex h-screen">
    <aside class="w-64 flex-shrink-0 flex flex-col shadow-xl z-20" style="background-color: var(--sidebar-bg); color: rgba(255,255,255,0.8);">
        <div class="h-16 flex items-center justify-center font-bold text-xl text-white tracking-widest border-b border-gray-700 font-bebas">WEI-ZHENG <span class="text-green-400 ml-1">v3.1</span></div>
        <nav class="flex-1 overflow-y-auto py-4">
            <div class="px-6 py-4">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">批次匯入並存檔</label>
                <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" multiple class="hidden" onchange="handleImport(event)">
                <button onclick="document.getElementById('excel-upload').click()" id="upload-btn" class="w-full py-2 bg-green-600 hover:bg-green-700 text-white rounded text-sm transition font-bold shadow-lg disabled:opacity-50" disabled><i class="fa-solid fa-spinner fa-spin mr-2"></i>連線中...</button>
            </div>
            <div class="mt-6 px-3">
                <li class="text-xs font-semibold text-gray-400 uppercase mb-2 px-3 flex justify-between"><span>廠商清單</span><span id="vendor-count" class="text-green-400">0</span></li>
                <ul id="vendor-items" class="space-y-1 text-sm"></ul>
            </div>
        </nav>
        <div class="p-4 border-t border-gray-700 text-[10px] text-gray-400">狀態: <span id="auth-status" class="text-yellow-500">正在登入...</span></div>
    </aside>
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <div id="global-spinner" class="absolute inset-0 z-50 flex items-center justify-center loading-overlay hidden">
            <div class="text-center"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-green-600 mb-4"></i><div class="text-sm font-bold text-gray-700">雲端資料同步中...</div></div>
        </div>
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10">
            <div><h1 class="text-lg font-bold text-gray-800">雲端估算資料庫</h1><p id="data-status" class="text-[10px] text-gray-500 italic">正在檢查連線...</p></div>
            <button onclick="clearCloudData()" id="delete-btn" class="px-3 py-1.5 border border-red-200 text-xs text-red-600 hover:bg-red-50 rounded transition disabled:opacity-30" disabled><i class="fa-solid fa-trash-can mr-1"></i>清除雲端</button>
        </header>
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="wz-card p-4 border-l-4 border-l-blue-500"><div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">總項次</div><div id="stat-total" class="text-3xl font-bebas text-blue-600">0</div></div>
                <div class="wz-card p-4 border-l-4 border-l-green-500"><div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">廠商數</div><div id="stat-vendors" class="text-3xl font-bebas text-green-600">0</div></div>
                <div class="wz-card p-4 border-l-4 border-l-cyan-500"><div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">結構 (C)</div><div id="stat-c" class="text-3xl font-bebas text-cyan-600">0</div></div>
                <div class="wz-card p-4 border-l-4 border-l-amber-500"><div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">地坪 (E)</div><div id="stat-e" class="text-3xl font-bebas text-amber-600">0</div></div>
            </div>
            <div class="wz-card p-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap gap-1.5" id="filter-btns"></div>
                <div class="relative w-full md:w-72"><i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="searchInput" oninput="renderTable()" placeholder="搜尋編號、名稱或廠商..." class="w-full border rounded-full pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"></div>
            </div>
            <div class="wz-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 border-b text-gray-600"><tr><th class="p-4 font-bold">分類</th><th class="p-4 font-bold">編號</th><th class="p-4 font-bold">工料名稱</th><th class="p-4 font-bold">單位</th><th class="p-4 font-bold">廠商</th><th class="p-4 font-bold text-right">數量</th></tr></thead>
                        <tbody id="table-body" class="divide-y divide-gray-100"><tr><td colspan="6" class="p-20 text-center text-gray-400 italic">等待連線中... 如果長時間沒反應請重新整理</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, writeBatch, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'weizheng-estimator-v3';
        let cloudData = [], currentFilter = 'ALL', currentUser = null, unsubscribeStore = null;
        const categoryMap = { 'C': '結構工程', 'D': '隔間工程', 'E': '地坪工程', 'F': '平頂工程', 'G': '內牆工程', 'H': '踢腳工程', 'I': '防水工程', 'K': '外牆工程', 'M': '門窗工程' };
        
        async function initApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { 
                    await signInWithCustomToken(auth, __initial_auth_token); 
                } else { 
                    await signInAnonymously(auth); 
                }
            } catch (err) { 
                console.error("Auth Error:", err);
                document.getElementById('auth-status').innerText = "連線失敗"; 
                document.getElementById('auth-status').className = "text-red-500";
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-status').innerText = "已連線";
                document.getElementById('auth-status').className = "text-green-400";
                const uploadBtn = document.getElementById('upload-btn');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2"></i>匯入資料`;
                document.getElementById('delete-btn').disabled = false;
                startSync();
            } else {
                currentUser = null;
                if (unsubscribeStore) unsubscribeStore();
                document.getElementById('auth-status').innerText = "未登入";
            }
        });

        function startSync() {
            if (!currentUser) return;
            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
            if (unsubscribeStore) unsubscribeStore();
            unsubscribeStore = onSnapshot(dataCol, (snap) => {
                cloudData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
                document.getElementById('data-status').innerText = `同步完成 (共 ${cloudData.length} 筆)`;
            }, (err) => { 
                console.error("Firestore Error:", err);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">無法讀取資料：請檢查權限或路徑。</td></tr>`; 
            });
        }

        window.handleImport = async (e) => {
            if (!currentUser) return;
            const files = e.target.files;
            if (!files.length) return;
            document.getElementById('global-spinner').classList.remove('hidden');
            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
            try {
                for (const file of files) {
                    const vendorName = file.name.replace(/\.[^/.]+$/, "");
                    const reader = new FileReader();
                    await new Promise((res, rej) => {
                        reader.onload = async (evt) => {
                            try {
                                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                                const batch = writeBatch(db);
                                let count = 0;
                                rows.forEach(r => {
                                    const code = (r['工料編號'] || r['編碼'] || '').toString().trim();
                                    const name = (r['工料名稱'] || r['名稱'] || '').toString().trim();
                                    if (!code || !name || code === '序號') return;
                                    const catKey = code.charAt(0).toUpperCase();
                                    batch.set(doc(dataCol), { code, name, unit: (r['單位'] || '-').toString().trim(), total: parseFloat((r['合計'] || r['數量'] || '0').toString().replace(/,/g, '')) || 0, vendor: vendorName, catCode: categoryMap[catKey] ? catKey : 'Other', catName: categoryMap[catKey] || '其他', timestamp: Date.now() });
                                    count++;
                                });
                                if (count > 0) await batch.commit();
                                res();
                            } catch (err) { rej(err); }
                        };
                        reader.readAsBinaryString(file);
                    });
                }
            } catch (err) { alert("匯入出錯"); } finally { document.getElementById('global-spinner').classList.add('hidden'); e.target.value = ''; }
        };

        window.clearCloudData = async () => {
            if (!currentUser || !confirm("確定要永久清空資料庫嗎？")) return;
            document.getElementById('global-spinner').classList.remove('hidden');
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'materials'));
                const batch = writeBatch(db);
                snap.docs.forEach(d => batch.delete(d.ref));
                await batch.commit();
            } finally { document.getElementById('global-spinner').classList.add('hidden'); }
        };

        function updateUI() { renderTable(); renderStats(); renderSidebar(); renderFilters(); }
        
        window.renderTable = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = cloudData.filter(m => (currentFilter === 'ALL' || m.catCode === currentFilter) && (m.name.toLowerCase().includes(search) || m.code.toLowerCase().includes(search) || m.vendor.toLowerCase().includes(search)));
            document.getElementById('table-body').innerHTML = filtered.length ? filtered.map(m => `
                <tr class="hover:bg-gray-50 border-b border-gray-100 transition"><td class="p-4"><span class="cat-pill cat-${m.catCode}">${m.catName}</span></td><td class="p-4 font-mono text-blue-700">${m.code}</td><td class="p-4 font-medium">${m.name}</td><td class="p-4 text-gray-500">${m.unit}</td><td class="p-4 text-xs text-gray-400">${m.vendor}</td><td class="p-4 text-right font-bold text-green-700 font-mono">${m.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</td></tr>
            `).join('') : `<tr><td colspan="6" class="p-20 text-center text-gray-400">目前無資料</td></tr>`;
        };

        function renderStats() {
            const vSet = new Set(cloudData.map(d => d.vendor));
            document.getElementById('stat-total').innerText = cloudData.length;
            document.getElementById('stat-vendors').innerText = vSet.size;
            document.getElementById('stat-c').innerText = cloudData.filter(m => m.catCode === 'C').length;
            document.getElementById('stat-e').innerText = cloudData.filter(m => m.catCode === 'E').length;
            document.getElementById('vendor-count').innerText = vSet.size;
        }

        function renderSidebar() {
            const vSet = new Set(cloudData.map(d => d.vendor));
            document.getElementById('vendor-items').innerHTML = vSet.size ? Array.from(vSet).map(v => `<li class="px-6 py-2 hover:bg-white/10 transition truncate text-xs"><i class="fa-solid fa-database text-green-400 mr-2"></i>${v}</li>`).join('') : `<li class="px-6 py-2 italic text-xs text-gray-500">暫無廠商資料</li>`;
        }

        function renderFilters() {
            const cats = ['ALL', ...Object.keys(categoryMap), 'Other'];
            document.getElementById('filter-btns').innerHTML = cats.map(c => {
                const count = c === 'ALL' ? cloudData.length : cloudData.filter(m => m.catCode === c).length;
                return (c === 'ALL' || count > 0) ? `<button onclick="window.setFilter('${c}')" class="px-3 py-1.5 text-xs border rounded-full transition ${currentFilter === c ? 'bg-[#3c4b64] text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100'}">${c === 'ALL' ? '全部' : (categoryMap[c] || '其他')} (${count})</button>` : '';
            }).join('');
        }

        window.setFilter = (c) => { currentFilter = c; updateUI(); };

        // 確保視窗載入後立即執行
        window.onload = initApp;
    </script>
</body>
</html>
