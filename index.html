<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崴正營造 — 工料彙整系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .sidebar { background: #1e293b; width: 300px; }
        .details-row { background-color: #f8fafc; display: none; }
        .details-row.active { display: table-row; }
        .expand-btn i { transition: 0.3s; color: #94a3b8; font-size: 12px; }
        .expanded .expand-btn i { transform: rotate(90deg); color: #10b981; }
        .row-merged { background-color: #fefce8 !important; }
        .row-selecting { background-color: #eff6ff !important; outline: 2px dashed #3b82f6; outline-offset: -2px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800">
    <aside class="sidebar flex flex-col p-6 text-white shadow-xl flex-shrink-0">
        <div class="flex items-center space-x-3 mb-10">
            <div class="bg-green-500 p-2 rounded-lg">
                <i class="fas fa-building text-white text-xl"></i>
            </div>
            <div class="text-2xl font-bold tracking-tight text-green-400">崴正營造</div>
        </div>
        <div class="space-y-8 flex-1 overflow-hidden flex flex-col">
            <div>
                <label class="block text-sm text-slate-400 mb-3">1. 標單載入</label>
                <input type="file" id="fileInput" multiple accept=".csv, .xlsx, .xls" class="hidden" onchange="loadFiles()">
                <button onclick="document.getElementById('fileInput').click()" class="w-full bg-green-500 hover:bg-green-600 py-3 rounded-xl font-bold shadow-lg shadow-green-900/20 transition-all flex items-center justify-center space-x-2">
                    <i class="fas fa-file-upload"></i>
                    <span>載入標單檔案</span>
                </button>
            </div>
            <div>
                <div class="flex justify-between items-center mb-3">
                    <label class="text-sm text-slate-400">2. 相似度比對門檻</label>
                    <div class="flex items-center space-x-1 bg-green-400/10 px-2 py-0.5 rounded text-sm text-green-400 font-bold border border-green-500/30 focus-within:border-green-400 transition-colors cursor-text" onclick="document.getElementById('thresholdInput').focus()">
                        <input type="number" id="thresholdInput" min="50" max="100" value="90" class="bg-transparent w-7 text-right outline-none p-0 text-green-400" onchange="syncThreshold('input', this.value)" onkeyup="if(event.key === 'Enter') this.blur()">
                        <span>%</span>
                    </div>
                </div>
                <input type="range" id="thresholdRange" min="50" max="100" value="90" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-green-500" oninput="syncThreshold('range', this.value)">
                <p class="text-[11px] text-slate-500 mt-2"><i class="fas fa-info-circle mr-1"></i> 可拖動滑桿或點擊數值手動輸入</p>
            </div>
            <div class="mt-4 border-t border-slate-700 pt-6 flex-1 flex flex-col overflow-hidden">
                <label class="block text-sm text-slate-400 mb-4 flex items-center">
                    <i class="fas fa-list-ul mr-2"></i> 3. 已載入檔案列表
                </label>
                <ul id="fileList" class="space-y-3 overflow-y-auto pr-1 flex-1">
                    <li class="text-slate-500 italic text-sm text-center py-10">目前無載入之檔案</li>
                </ul>
            </div>
        </div>
    </aside>
    <main class="flex-1 flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">工料彙整明細表</h1>
                <p class="text-slate-500 mt-2 text-sm flex items-center">
                    <span class="inline-block w-3 h-3 bg-yellow-200 border border-yellow-300 rounded-sm mr-2"></span>
                    系統將依據設定門檻自動比對相似工料，並擷取共同字串作為代表名稱。
                </p>
            </div>
        </header>
        <div class="bg-white rounded-2xl shadow-sm flex-1 overflow-hidden border border-slate-200 flex flex-col relative">
            <div class="overflow-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-slate-100 border-b border-slate-200 z-20">
                        <tr>
                            <th class="p-5 w-14 text-center text-slate-400 font-medium">#</th>
                            <th class="p-5 text-slate-600 font-bold">工料名稱</th>
                            <th class="p-5 w-28 text-slate-600 font-bold">單位</th>
                            <th class="p-5 w-40 text-right text-slate-600 font-bold">加總合計</th>
                            <th class="p-5 w-32 text-center text-slate-600 font-bold">操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-slate-100">
                        <tr><td colspan="5" class="p-20 text-center text-slate-400 italic">請自左側面板載入標單檔案以進行分析作業。</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="deleteModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex justify-center items-center backdrop-blur-sm transition-all">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-[400px] transform transition-all scale-100 border border-slate-100">
            <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">檔案移除確認</h3>
            <p class="text-slate-500 mb-8 leading-relaxed text-sm">
                是否確認移除下列檔案： <br><span id="modalFileName" class="font-bold text-red-500 break-all"></span>？
            </p>
            <div class="flex space-x-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 transition font-bold text-sm">取消</button>
                <button onclick="confirmRemoveFile()" class="flex-1 py-3 bg-red-500 text-white rounded-xl hover:bg-red-600 transition font-bold text-sm shadow-lg shadow-red-200">確認移除</button>
            </div>
        </div>
    </div>
    <script>
        let cachedRawData = []; 
        let currentDisplayData = []; 
        let sourceToMerge = null;
        let loadedFiles = []; 
        let fileToDelete = null;
        function syncThreshold(source, val) {
            let numVal = parseInt(val, 10);
            if (isNaN(numVal)) numVal = 90;
            if (numVal < 50) numVal = 50;
            if (numVal > 100) numVal = 100;
            const inputEl = document.getElementById('thresholdInput');
            const rangeEl = document.getElementById('thresholdRange');
            if (source === 'input') {
                inputEl.value = numVal;
                rangeEl.value = numVal;
            } else {
                inputEl.value = numVal;
            }
            autoProcess();
        }
        function getCommonSubstring(strings) {
            if (!strings || strings.length === 0) return "";
            if (strings.length === 1) return strings[0];
            let shortest = strings.reduce((a, b) => a.length <= b.length ? a : b);
            let lcs = "";
            for (let i = 0; i < shortest.length; i++) {
                for (let j = i + 1; j <= shortest.length; j++) {
                    let substr = shortest.slice(i, j);
                    if (strings.every(str => str.includes(substr))) {
                        if (substr.length > lcs.length) lcs = substr;
                    }
                }
            }
            return lcs.length >= 2 ? lcs : strings[0];
        }
        async function loadFiles() {
            const files = document.getElementById('fileInput').files;
            if(!files.length) return;
            for (let f of files) {
                if (loadedFiles.includes(f.name)) continue; 
                const data = await readFile(f);
                cachedRawData = cachedRawData.concat(data);
                loadedFiles.push(f.name);
            }
            document.getElementById('fileInput').value = '';
            renderFileList();
            autoProcess();
        }
        function openDeleteModal(fileName) {
            fileToDelete = fileName;
            document.getElementById('modalFileName').innerText = fileName;
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        function closeDeleteModal() {
            fileToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }
        function confirmRemoveFile() {
            if (!fileToDelete) return;
            cachedRawData = cachedRawData.filter(item => item.fileName !== fileToDelete);
            loadedFiles = loadedFiles.filter(name => name !== fileToDelete);
            renderFileList();
            autoProcess();
            closeDeleteModal();
        }
        function renderFileList() {
            const listEl = document.getElementById('fileList');
            if (loadedFiles.length === 0) {
                listEl.innerHTML = '<li class="text-slate-500 italic text-sm text-center py-10">目前無載入之檔案</li>';
                return;
            }
            listEl.innerHTML = loadedFiles.map(name => `
                <li class="flex flex-col bg-slate-800/50 border border-slate-700 p-3 rounded-xl group hover:border-slate-500 transition-colors">
                    <div class="flex justify-between items-start">
                        <div class="flex items-start space-x-2 overflow-hidden">
                            <i class="fas fa-file-excel text-green-500 mt-1"></i>
                            <span class="truncate text-[13px] text-slate-200" title="${name}">${name}</span>
                        </div>
                        <button onclick="openDeleteModal('${name}')" class="text-slate-500 hover:text-red-400 p-1 transition">
                            <i class="fas fa-trash-can"></i>
                        </button>
                    </div>
                </li>
            `).join('');
        }
        function autoProcess() {
            const threshold = document.getElementById('thresholdRange').value / 100;
            const merged = [];
            const dataCopy = JSON.parse(JSON.stringify(cachedRawData));
            dataCopy.forEach(item => {
                const fuse = new Fuse(merged, { keys: ["name"], threshold: 1 - threshold });
                const result = fuse.search(item.name);
                if (result.length > 0) {
                    const target = merged[result[0].refIndex];
                    target.total += item.total;
                    target.details.push(item);
                } else {
                    item.details = [JSON.parse(JSON.stringify(item))];
                    merged.push(item);
                }
            });
            currentDisplayData = merged;
            sourceToMerge = null;
            render();
        }
        function startManualMerge(idx, event) {
            event.stopPropagation();
            sourceToMerge = idx;
            render();
        }
        function cancelManualMerge(event) {
            if(event) event.stopPropagation();
            sourceToMerge = null;
            render();
        }
        function commitMerge(targetIdx, event) {
            event.stopPropagation();
            if (sourceToMerge === null || sourceToMerge === targetIdx) return;
            const source = currentDisplayData[sourceToMerge];
            const target = currentDisplayData[targetIdx];
            target.total += source.total;
            target.details = target.details.concat(source.details);
            currentDisplayData.splice(sourceToMerge, 1);
            sourceToMerge = null;
            render();
        }
        function unbindDetail(mainIdx, detailIdx, event) {
            event.stopPropagation();
            const detailItem = currentDisplayData[mainIdx].details.splice(detailIdx, 1)[0];
            currentDisplayData[mainIdx].total -= detailItem.total;
            currentDisplayData.push({ 
                name: detailItem.name, unit: detailItem.unit, total: detailItem.total, details: [detailItem] 
            });
            if (currentDisplayData[mainIdx].details.length === 0) currentDisplayData.splice(mainIdx, 1);
            render();
        }
        function render() {
            const body = document.getElementById('resultBody');
            if (currentDisplayData.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-slate-400 italic">請自左側面板載入標單檔案以進行分析作業。</td></tr>';
                return;
            }
            let html = sourceToMerge !== null ? `
                <tr class="sticky top-[73px] z-10">
                    <td colspan="5" class="bg-blue-600 text-white p-3 text-center text-sm font-bold shadow-lg animate-pulse flex items-center justify-center space-x-2">
                        <i class="fas fa-link"></i>
                        <span>【手動合併作業進行中】請選擇目標項目執行「併入」，或點擊「取消」終止操作。</span>
                    </td>
                </tr>
            ` : '';
            html += currentDisplayData.map((item, idx) => {
                const isMerged = item.details.length > 1;
                const isBeingSelected = sourceToMerge === idx;
                const isMergingMode = sourceToMerge !== null;
                let displayName = isMerged ? getCommonSubstring(item.details.map(d => d.name)) : item.name;
                let actionBtnHTML = '';
                if (!isMergingMode) {
                    actionBtnHTML = `<button onclick="startManualMerge(${idx}, event)" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-1.5 rounded-lg text-[12px] font-bold transition flex items-center space-x-1"><i class="fas fa-link"></i><span>手動</span></button>`;
                } else if (isBeingSelected) {
                    actionBtnHTML = `<button onclick="cancelManualMerge(event)" class="text-white bg-slate-500 hover:bg-slate-600 px-4 py-1.5 rounded-lg text-[12px] font-bold transition shadow-md">取消</button>`;
                } else {
                    actionBtnHTML = `<button onclick="commitMerge(${idx}, event)" class="text-white bg-green-500 hover:bg-green-600 px-4 py-1.5 rounded-lg text-[12px] font-bold transition shadow-md w-full flex items-center justify-center space-x-1"><i class="fas fa-file-import"></i><span>併入</span></button>`;
                }
                return `
                <tr class="group cursor-pointer hover:bg-slate-50/80 transition-all ${isMerged ? 'row-merged' : ''} ${isBeingSelected ? 'row-selecting' : ''}" onclick="toggleDetails(${idx}, this)">
                    <td class="p-5 text-center expand-btn"><i class="fas fa-caret-right"></i></td>
                    <td class="p-5 font-bold text-slate-800">
                        ${displayName} 
                        ${isMerged ? `<span class="ml-2 text-[10px] bg-yellow-400/30 text-yellow-800 px-2 py-0.5 rounded-full border border-yellow-400/50">包含 ${item.details.length} 筆</span>` : ''}
                    </td>
                    <td class="p-5 text-slate-500 text-sm">${item.unit}</td>
                    <td class="p-5 text-right font-mono font-bold text-slate-700">${item.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="p-5 text-center" onclick="event.stopPropagation()">
                        <div class="flex justify-center">${actionBtnHTML}</div>
                    </td>
                </tr>
                <tr id="details-${idx}" class="details-row">
                    <td colspan="5" class="p-0">
                        <div class="p-8 bg-slate-50 border-x border-b shadow-inner">
                            <table class="w-full text-[13px]">
                                <thead class="text-slate-400 border-b border-slate-200">
                                    <tr>
                                        <th class="pb-3 text-left font-medium">來源檔案</th>
                                        <th class="pb-3 text-left font-medium">原始標單名稱</th>
                                        <th class="pb-3 text-right font-medium">原始數量</th>
                                        <th class="pb-3 w-20 text-center font-medium">解除合併</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${item.details.map((d, dIdx) => `
                                        <tr class="hover:bg-white transition-colors">
                                            <td class="py-3 text-slate-400 font-medium font-mono text-[11px]">${d.fileName}</td>
                                            <td class="py-3 italic text-slate-600">${d.name}</td>
                                            <td class="py-3 text-right font-bold text-slate-500 font-mono">${d.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                            <td class="py-3 text-center">
                                                ${isMerged ? `<button onclick="unbindDetail(${idx}, ${dIdx}, event)" class="text-red-300 hover:text-red-500 p-1 transition" title="解除合併"><i class="fas fa-scissors"></i></button>` : '-'}
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </td>
                </tr>
                `}).join('');
            body.innerHTML = html;
        }
        function readFile(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const workbook = XLSX.read(e.target.result, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                    const rows = [];
                    json.forEach(r => {
                        if (r.length < 3) return;
                        const name = String(r[2] || "").trim();
                        let total = 0;
                        for(let i=r.length-1; i>=0; i--) { 
                            let v = parseFloat(r[i]); if(!isNaN(v)) { total = v; break; } 
                        }
                        if (name && !["工料名稱", "C1", "項目名稱", "nan"].includes(name)) {
                            rows.push({ name, unit: String(r[3]||"-"), total, fileName: file.name });
                        }
                    });
                    resolve(rows);
                };
                reader.readAsArrayBuffer(file);
            });
        }
        function toggleDetails(idx, el) {
            if(sourceToMerge !== null) return;
            const row = document.getElementById(`details-${idx}`);
            row.classList.toggle('active');
            el.classList.toggle('expanded');
        }
    </script>
</body>
</html>
